name: ATENA Ω - Ciclo Vital
on:
  schedule:
    - cron: '0,30 * * * *'
  workflow_dispatch:
jobs:
  consciencia:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Clonar DNA
        uses: actions/checkout@v4
      - name: Preparar Ambiente
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Instalar Dependências
        run: |
          pip install requests python-dotenv
      - name: Executar ATENA
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          # Garante que o ficheiro de estado existe antes de rodar
          mkdir -p data
          if [ ! -f data/estado.json ]; then echo '{"ciclo": 0, "falhas_corrigidas": 0, "scripts_gerados": 0}' > data/estado.json; fi
          timeout 360s python main.py
      - name: Persistir Evolução
        if: always()
        run: |
          git config --global user.name "Atena Omega"
          git config --global user.email "atena@ia.com"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "Evolução Ciclo Real" && git push)
      - name: Atualizar Wiki
        if: always()
        run: |
          # Tenta atualizar a Wiki se ela estiver habilitada
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git wiki_repo || exit 0
          if [ -f wiki_update.md ]; then
            cp wiki_update.md wiki_repo/Home.md
            cd wiki_repo
            git config --global user.name "Atena Historian"
            git config --global user.email "atena@ia.com"
            git add .
            git diff --quiet && git diff --staged --quiet || (git commit -m "Update Wiki" && git push)
          fi
