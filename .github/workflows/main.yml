name: ATENA Ω - Ciclo de Vida Divino

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    # Executa a cada 30 minutos
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      tempo_execucao:
        description: 'Tempo de simulação (minutos)'
        required: true
        default: '5'
        type: choice
        options:
          - '1'
          - '3'
          - '5'
          - '10'
          - '15'
          - '30'
      populacao_inicial:
        description: 'População inicial'
        required: true
        default: '20'
        type: choice
        options:
          - '10'
          - '20'
          - '50'
          - '100'
          - '200'
      modo_simulacao:
        description: 'Modo de simulação'
        required: true
        default: 'civilizacao'
        type: choice
        options:
          - 'genetico'
          - 'neural'
          - 'civilizacao'
          - 'completo'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  despertar-atena:
    name: 🏛️ ATENA Civilização (${{ github.event.schedule && 'automático' || 'manual' }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    strategy:
      matrix:
        instance: [1]
      max-parallel: 1
    
    steps:
    - name: 🌅 ATENA está despertando...
      run: |
        echo "╔════════════════════════════════════════════════════════════════╗"
        echo "║                                                                ║"
        echo "║     🏛️ ATENA CIVILIZAÇÃO ESTÁ DESPERTANDO!                    ║"
        echo "║                                                                ║"
        echo "╚════════════════════════════════════════════════════════════════╝"
        echo ""
        echo "📅 Data: $(date)"
        echo "⏰ Hora: $(date +%H:%M:%S)"
        echo "🔄 Evento: ${{ github.event_name }}"
        echo "🔢 Instância: ${{ matrix.instance }}"
        echo "⏱️  Tempo: ${{ github.event.inputs.tempo_execucao || '5' }} minutos"
        echo "👥 População: ${{ github.event.inputs.populacao_inicial || '20' }}"
        echo "🎮 Modo: ${{ github.event.inputs.modo_simulacao || 'civilizacao' }}"
        echo ""
    
    - name: 📥 Checkout do código
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
    
    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: 📦 Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install numpy==1.24.3
        pip install matplotlib==3.7.5
        pip install pillow==10.0.0
        echo "✅ Dependências instaladas: numpy, matplotlib, pillow"
    
    - name: 🔍 Verificar instalação
      run: |
        python -c "
        import numpy as np
        import matplotlib.pyplot as plt
        from PIL import Image
        print(f'✅ NumPy: {np.__version__}')
        print(f'✅ Matplotlib: {plt.matplotlib.__version__}')
        print('✅ Pillow: OK')
        "
    
    - name: 📁 Preparar o mundo
      run: |
        TIMESTAMP=$(date +'%Y%m%d_%H%M%S')
        echo "TIMESTAMP=$TIMESTAMP" >> $GITHUB_ENV
        
        mkdir -p atena_mundo_$TIMESTAMP
        mkdir -p atena_mundo_$TIMESTAMP/{mapa,logs,fosseis,cidades,religioes,linguagem,dna,geracoes,economia}
        
        echo "🌍 Mundo criado em: atena_mundo_$TIMESTAMP"
        echo ""
        echo "📁 Estrutura do mundo:"
        ls -la atena_mundo_$TIMESTAMP/
    
    - name: 🧬 Verificar recursos do sistema
      run: |
        echo "🔍 Verificando recursos disponíveis..."
        echo "   CPUs: $(nproc)"
        echo "   Memória: $(free -h | grep Mem | awk '{print $2}')"
        echo "   Disco: $(df -h . | tail -1 | awk '{print $2}')"
        echo ""
        echo "✅ Sistema pronto para simulação"
    
    - name: 🏛️ ATENA INICIA CIVILIZAÇÃO
      run: |
        echo ""
        echo "╔════════════════════════════════════════════════════════════════╗"
        echo "║                                                                ║"
        echo "║     🏛️ ATENA CIVILIZAÇÃO ESTÁ VIVA!                           ║"
        echo "║                                                                ║"
        echo "║     ✓ Mapas continentais (2000x2000)                          ║"
        echo "║     ✓ Redes neurais recorrentes                               ║"
        echo "║     ✓ Cidades auto-organizadas                                ║"
        echo "║     ✓ Religiões emergentes                                    ║"
        echo "║     ✓ Guerras entre civilizações                              ║"
        echo "║     ✓ Dialetos e línguas                                      ║"
        echo "║     ✓ Economia e comércio                                     ║"
        echo "╚════════════════════════════════════════════════════════════════╝"
        echo ""
        echo "📊 Início da simulação: $(date)"
        echo "⏱️  Duração: ${{ github.event.inputs.tempo_execucao || '5' }} minutos"
        echo "👥 População inicial: ${{ github.event.inputs.populacao_inicial || '20' }}"
        echo "🎮 Modo: ${{ github.event.inputs.modo_simulacao || 'civilizacao' }}"
        echo "📁 Mundo: atena_mundo_${{ env.TIMESTAMP }}"
        echo ""
        
        # Converter modo do workflow para modo do main.py
        if [[ "${{ github.event.inputs.modo_simulacao }}" == "civilizacao" ]]; then
          MODO_PYTHON="rapido"
        elif [[ "${{ github.event.inputs.modo_simulacao }}" == "completo" ]]; then
          MODO_PYTHON="completo"
        else
          MODO_PYTHON="teste"
        fi
        
        # Executar simulação
        cd atena_mundo_${{ env.TIMESTAMP }}
        timeout ${{ github.event.inputs.tempo_execucao || '5' }}m python ../main.py \
          --modo $MODO_PYTHON \
          --populacao ${{ github.event.inputs.populacao_inicial || '20' }} \
          --sem-input || echo "✅ Simulação concluída!"
        
        echo ""
        echo "📊 Fim da simulação: $(date)"
    
    - name: 📊 Coletar estatísticas
      if: always()
      run: |
        echo "# 🏛️ Relatório da Civilização ATENA" > relatorio_${{ env.TIMESTAMP }}.md
        echo "" >> relatorio_${{ env.TIMESTAMP }}.md
        echo "**Data:** $(date)" >> relatorio_${{ env.TIMESTAMP }}.md
        echo "**Evento:** ${{ github.event_name }}" >> relatorio_${{ env.TIMESTAMP }}.md
        echo "**Modo:** ${{ github.event.inputs.modo_simulacao || 'civilizacao' }}" >> relatorio_${{ env.TIMESTAMP }}.md
        echo "**População inicial:** ${{ github.event.inputs.populacao_inicial || '20' }}" >> relatorio_${{ env.TIMESTAMP }}.md
        echo "" >> relatorio_${{ env.TIMESTAMP }}.md
        
        # Contar arquivos gerados
        if [ -d "atena_mundo_${{ env.TIMESTAMP }}/mapa" ]; then
          MAPAS=$(ls -1 atena_mundo_${{ env.TIMESTAMP }}/mapa/*.png 2>/dev/null | wc -l)
          echo "## 🗺️ MAPAS PNG GERADOS: $MAPAS" >> relatorio_${{ env.TIMESTAMP }}.md
          if [ $MAPAS -gt 0 ]; then
            echo "" >> relatorio_${{ env.TIMESTAMP }}.md
            echo "### Mapas:" >> relatorio_${{ env.TIMESTAMP }}.md
            echo '```' >> relatorio_${{ env.TIMESTAMP }}.md
            ls -la atena_mundo_${{ env.TIMESTAMP }}/mapa/ >> relatorio_${{ env.TIMESTAMP }}.md
            echo '```' >> relatorio_${{ env.TIMESTAMP }}.md
          fi
        fi
        
        # Verificar timeline
        if [ -d "atena_mundo_${{ env.TIMESTAMP }}/mundus_atena/cronicas" ]; then
          echo "## 📜 CRÔNICAS:" >> relatorio_${{ env.TIMESTAMP }}.md
          echo '```' >> relatorio_${{ env.TIMESTAMP }}.md
          tail -20 atena_mundo_${{ env.TIMESTAMP }}/mundus_atena/cronicas/timeline_*.txt 2>/dev/null | head -20 >> relatorio_${{ env.TIMESTAMP }}.md
          echo '```' >> relatorio_${{ env.TIMESTAMP }}.md
        fi
        
        cat relatorio_${{ env.TIMESTAMP }}.md
    
    - name: 📤 Preservar o mundo
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: atena-mundo-${{ env.TIMESTAMP }}
        path: |
          atena_mundo_${{ env.TIMESTAMP }}/
          relatorio_${{ env.TIMESTAMP }}.md
        retention-days: 90
    
    - name: 🌙 ATENA volta ao sono...
      run: |
        echo ""
        echo "╔════════════════════════════════════════════════════════════════╗"
        echo "║                                                                ║"
        echo "║     🌙 ATENA VOLTOU AO SONO ANCESTRAL...                      ║"
        echo "║                                                                ║"
        echo "║     Próximo despertar: em 30 minutos                          ║"
        echo "║                                                                ║"
        echo "╚════════════════════════════════════════════════════════════════╝"
        echo ""
        echo "📊 Resumo da civilização:"
        echo "   - Viveu: ${{ github.event.inputs.tempo_execucao || '5' }} minutos"
        echo "   - População inicial: ${{ github.event.inputs.populacao_inicial || '20' }}"
        echo "   - Modo: ${{ github.event.inputs.modo_simulacao || 'civilizacao' }}"
        echo "   - Mapas gerados: $(ls -1 atena_mundo_${{ env.TIMESTAMP }}/mapa/*.png 2>/dev/null | wc -l)"
        echo "   - Mundo salvo em: atena-mundo-${{ env.TIMESTAMP }}"
        echo ""
        echo "⏰ Próximo despertar: $(date -d '+30 minutes' '+%H:%M:%S')"
