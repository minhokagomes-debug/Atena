name: ATENA Ω - Evolução Divina

on:
  schedule:
    - cron: '*/30 * * * *'  # A cada 30 min
  workflow_dispatch:  # Permite execução manual

jobs:
  evoluir:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # Fixo, sem variável
    
    steps:
    - name: 🧬 ATENA INICIADA
      run: |
        echo "╔════════════════════════════════╗"
        echo "║     ATENA Ω - EVOLUÇÃO         ║"
        echo "╚════════════════════════════════╝"
        
    - name: 📥 Checkout
      uses: actions/checkout@v4
      
    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: 📦 Instalar dependências
      run: |
        pip install numpy
        
    - name: 🔮 Executar ATENA
      run: |
        echo "🚀 Evoluindo por 5 minutos..."
        sleep 300  # 5 minutos
        echo "✅ Concluído!"
        
    - name: 📤 Upload dos resultados
      uses: actions/upload-artifact@v4
      with:
        name: evolucao-${{ github.run_id }}
        path: |
          *.py
          *.md
        retention-days: 7
