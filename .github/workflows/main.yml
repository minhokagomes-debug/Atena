name: 🧬 ATENA Ω - Evolução Divina

on:
  schedule:
    - cron: '*/30 * * * *'  # A cada 30 minutos
  workflow_dispatch:  # Execução manual
    inputs:
      generations:
        description: 'Número de gerações'
        required: true
        default: '3'
        type: choice
        options:
          - '1'
          - '3'
          - '5'
          - '10'

permissions:
  contents: write
  actions: write

env:
  PYTHON_VERSION: '3.11'
  GENERATIONS: ${{ github.event.inputs.generations || '3' }}
  # Injetando as APIs que você cadastrou no cérebro da Atena
  GH_TOKEN: ${{ secrets.GH_TOKEN }}
  GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
  NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}

jobs:
  evoluir:
    name: 🧠 Evolução Neural
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - name: ⚡ Banner
      run: |
        echo "╔════════════════════════════════════════╗"
        echo "║     ATENA Ω - EVOLUÇÃO DIVINA         ║"
        echo "║     Conectando APIs de Conhecimento   ║"
        echo "╚════════════════════════════════════════╝"
        echo "📅 Data: $(date)"
        echo "🎯 Gerações para processar: ${{ env.GENERATIONS }}"
    
    - name: 📥 Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Necessário para o Auto-Commit funcionar
      
    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: 📦 Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install numpy scikit-learn psutil joblib requests beautifulsoup4 fastapi uvicorn Pillow
        
    - name: 📂 Criar diretórios de memória
      run: |
        mkdir -p resultados logs modelos cache atena_data/vision_input
        
    - name: 🔮 Executar ATENA Core (Auto-Modificação)
      id: execucao
      run: |
        echo "🚀 Iniciando motor de evolução..."
        
        # AJUSTE: Se seu arquivo principal for main.py, mantenha assim:
        FILENAME="main.py"
        
        if [ ! -f "$FILENAME" ]; then
          echo "❌ ERRO: Arquivo $FILENAME não encontrado no repositório!"
          ls -R # Lista os arquivos para ajudar você a debugar
          exit 1
        fi
        
        # Execução real do cérebro
        python $FILENAME ${{ env.GENERATIONS }}
        
        echo "✅ Ciclo de processamento concluído"
        
    - name: 📊 Gerar Relatório de Inteligência
      run: |
        echo "# 🧬 Relatório de Ciclo ATENA Ω" > relatorio.md
        echo "- **Data:** $(date)" >> relatorio.md
        echo "- **Gerações Processadas:** ${{ env.GENERATIONS }}" >> relatorio.md
        echo "- **APIs Ativas:** GitHub, Grok, News" >> relatorio.md
        echo "---" >> relatorio.md
        
    - name: 📤 Salvar Memória (Artifacts)
      uses: actions/upload-artifact@v4
      with:
        name: atena-brain-data-${{ github.run_id }}
        path: |
          atena_data/
          resultados/
          relatorio.md
        retention-days: 7
        
    - name: ✅ Finalização
      run: |
        echo "✅ Evolução concluída. Próximo ciclo em 30 minutos."
        
