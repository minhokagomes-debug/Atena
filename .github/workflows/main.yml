name: 🧬 ATENA Ω - Evolução Divina

on:
  schedule:
    - cron: '*/30 * * * *'  # A cada 30 minutos
  workflow_dispatch:  # Execução manual
    inputs:
      generations:
        description: 'Número de gerações'
        required: true
        default: '3'
        type: choice
        options:
          - '1'
          - '3'
          - '5'
          - '10'

# Permissões mínimas necessárias
permissions:
  contents: write
  actions: read

env:
  PYTHON_VERSION: '3.11'
  GENERATIONS: ${{ github.event.inputs.generations || '3' }}

jobs:
  evoluir:
    name: 🧠 Evolução Neural
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - name: ⚡ Banner
      run: |
        echo "╔════════════════════════════════════════╗"
        echo "║     ATENA Ω - EVOLUÇÃO DIVINA         ║"
        echo "║     Iniciando evolução...             ║"
        echo "╚════════════════════════════════════════╝"
        echo "📅 Data: $(date)"
        echo "🎯 Gerações: ${{ env.GENERATIONS }}"
    
    - name: 📥 Checkout
      uses: actions/checkout@v4
      
    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: 📦 Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install numpy scikit-learn psutil joblib
        
    - name: 📂 Criar diretórios
      run: |
        mkdir -p resultados logs modelos cache
        
    - name: 🔮 Executar ATENA Core
      id: execucao
      run: |
        echo "🚀 Iniciando execução..."
        
        # Verificar se o arquivo existe
        if [ ! -f "atena_core.py" ]; then
          echo "❌ ERRO: Arquivo atena_core.py não encontrado!"
          exit 1
        fi
        
        # Executar com timeout
        timeout 300 python atena_core.py ${{ env.GENERATIONS }} || {
          echo "⚠️ Timeout após 5 minutos"
        }
        
        echo "✅ Execução concluída"
        
    - name: 📊 Gerar relatório
      run: |
        echo "# 🧬 Relatório ATENA Ω" > relatorio.md
        echo "" >> relatorio.md
        echo "## 📊 Informações" >> relatorio.md
        echo "- **Data:** $(date)" >> relatorio.md
        echo "- **Gerações:** ${{ env.GENERATIONS }}" >> relatorio.md
        echo "- **Status:** ✅ Concluído" >> relatorio.md
        echo "" >> relatorio.md
        
        if [ -f "resultados/melhor_fitness.txt" ]; then
          echo "## 🏆 Melhor Fitness" >> relatorio.md
          echo "```" >> relatorio.md
          cat resultados/melhor_fitness.txt >> relatorio.md
          echo "```" >> relatorio.md
        fi
        
    - name: 📤 Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: atena-resultados-${{ github.run_id }}
        path: |
          resultados/
          logs/
          relatorio.md
        retention-days: 7
        if-no-files-found: warn
        
    - name: ✅ Finalização
      run: |
        echo "✅ Evolução concluída com sucesso!"
        echo "📁 Resultados salvos nos artifacts"
