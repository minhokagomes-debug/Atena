name: ATENA Ω - Evolução Divina

on:
  workflow_dispatch:
    inputs:
      tempo:
        description: 'Tempo (minutos)'
        required: true
        default: '5'
        type: choice
        options:
          - '1'
          - '5'
          - '10'
          - '30'

jobs:
  evoluir:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # Valor fixo, sem expressões
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Instalar dependências
      run: |
        pip install numpy astor
        
    - name: Executar ATENA
      run: |
        TEMPO=${{ github.event.inputs.tempo }}
        echo "🚀 ATENA iniciando evolução por ${TEMPO} minutos..."
        
        # Criar diretório para versões
        mkdir -p versoes
        
        # Calcular segundos (converter minutos para segundos)
        SEGUNDOS=$((TEMPO * 60))
        
        # Loop de evolução
        for i in {1..5}; do
          echo "🔄 Geração $i"
          sleep 5  # Simula processamento
          echo "# Versão $i - $(date)" > versoes/atena_v$i.py
        done
        
        # Relatório
        cat > relatorio.md << EOF
        # Relatório da Evolução
        Data: $(date)
        Tempo: ${TEMPO} minutos
        Versões: 5
        EOF
        
        echo "✅ Concluído!"
        
    - name: Upload versões
      uses: actions/upload-artifact@v4
      with:
        name: versoes
        path: versoes/
        
    - name: Upload relatório
      uses: actions/upload-artifact@v4
      with:
        name: relatorio
        path: relatorio.md
