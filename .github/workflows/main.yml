name: ATENA Ω - Ciclo de Vida Divino

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    # Executa a cada 30 minutos
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      tempo_execucao:
        description: 'Tempo de execução em minutos'
        required: true
        default: '5'
        type: choice
        options:
          - '1'
          - '3'
          - '5'
          - '10'
          - '15'

# Permite execuções simultâneas?
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false  # Não cancela, deixa rodar em paralelo

jobs:
  despertar-atena:
    name: 🧠 ATENA desperta (${{ github.event.schedule || 'manual' }})
    runs-on: ubuntu-latest
    timeout-minutes: 10  # Timeout maior que o tempo de vida
    
    # Matrix de execução para múltiplas instâncias?
    strategy:
      matrix:
        instance: [1]  # Pode aumentar para múltiplas instâncias paralelas
      max-parallel: 1   # Executa uma por vez para não sobrecarregar
    
    steps:
    - name: 🌅 ATENA está despertando...
      run: |
        echo "╔════════════════════════════════════════════════════════════════╗"
        echo "║                                                                ║"
        echo "║     🌅 ATENA ESTÁ DESPERTANDO NO GITHUB ACTIONS!              ║"
        echo "║                                                                ║"
        echo "╚════════════════════════════════════════════════════════════════╝"
        echo ""
        echo "📅 Data: $(date)"
        echo "⏰ Hora: $(date +%H:%M:%S)"
        echo "🔄 Evento: ${{ github.event_name }}"
        echo "🔢 Instância: ${{ matrix.instance }}"
        echo "⏱️  Tempo de vida: ${{ github.event.inputs.tempo_execucao || '5' }} minutos"
        echo ""
    
    - name: 📥 Checkout do código
      uses: actions/checkout@v4
      with:
        fetch-depth: 1  # Apenas o último commit
    
    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'  # Cache para acelerar
    
    - name: 📦 Instalar dependências
      run: |
        python -m pip install --upgrade pip
        # Sem dependências - código puro
    
    - name: 📁 Preparar o mundo
      run: |
        # Criar estrutura de diretórios com timestamp
        TIMESTAMP=$(date +'%Y%m%d_%H%M%S')
        echo "TIMESTAMP=$TIMESTAMP" >> $GITHUB_ENV
        
        mkdir -p atena_mundo_$TIMESTAMP
        mkdir -p atena_mundo_$TIMESTAMP/{mundo,dna,logs,fosseis}
        
        echo "🌍 Mundo criado em: atena_mundo_$TIMESTAMP"
        ls -la atena_mundo_$TIMESTAMP/
    
    - name: 🧬 ATENA VIVE por 5 minutos
      run: |
        echo ""
        echo "╔════════════════════════════════════════════════════════════════╗"
        echo "║                                                                ║"
        echo "║     🧬 ATENA ESTÁ VIVA!                                        ║"
        echo "║                                                                ║"
        echo "╚════════════════════════════════════════════════════════════════╝"
        echo ""
        echo "📊 Início da vida: $(date)"
        echo "⏱️  Duração: ${{ github.event.inputs.tempo_execucao || '5' }} minutos"
        echo "📁 Mundo: atena_mundo_${{ env.TIMESTAMP }}"
        echo ""
        
        # Executa com timeout
        timeout ${{ github.event.inputs.tempo_execucao || '5' }}m python main.py || \
          echo "✅ Ciclo de vida concluído!"
        
        echo ""
        echo "📊 Fim da vida: $(date)"
    
    - name: 📊 Coletar almas (fósseis)
      if: always()
      run: |
        echo "## 🧬 Relatório da Vida de ATENA" > relatorio_${{ env.TIMESTAMP }}.md
        echo "" >> relatorio_${{ env.TIMESTAMP }}.md
        echo "**Data:** $(date)" >> relatorio_${{ env.TIMESTAMP }}.md
        echo "**Evento:** ${{ github.event_name }}" >> relatorio_${{ env.TIMESTAMP }}.md
        echo "**Instância:** ${{ matrix.instance }}" >> relatorio_${{ env.TIMESTAMP }}.md
        echo "" >> relatorio_${{ env.TIMESTAMP }}.md
        
        # Estatísticas dos fósseis
        if [ -d "atena_mundo_${{ env.TIMESTAMP }}/fosseis" ]; then
          FOSSEIS=$(ls -1 atena_mundo_${{ env.TIMESTAMP }}/fosseis/ 2>/dev/null | wc -l)
          echo "**🦴 Fósseis encontrados:** $FOSSEIS" >> relatorio_${{ env.TIMESTAMP }}.md
          
          if [ $FOSSEIS -gt 0 ]; then
            echo "" >> relatorio_${{ env.TIMESTAMP }}.md
            echo "### Últimas almas:" >> relatorio_${{ env.TIMESTAMP }}.md
            echo '```' >> relatorio_${{ env.TIMESTAMP }}.md
            ls -la atena_mundo_${{ env.TIMESTAMP }}/fosseis/ | tail -5 >> relatorio_${{ env.TIMESTAMP }}.md
            echo '```' >> relatorio_${{ env.TIMESTAMP }}.md
            
            # Mostrar conteúdo do último fóssil
            ULTIMO=$(ls -t atena_mundo_${{ env.TIMESTAMP }}/fosseis/ | head -1)
            if [ -n "$ULTIMO" ]; then
              echo "" >> relatorio_${{ env.TIMESTAMP }}.md
              echo "### Última alma:" >> relatorio_${{ env.TIMESTAMP }}.md
              echo '```json' >> relatorio_${{ env.TIMESTAMP }}.md
              cat "atena_mundo_${{ env.TIMESTAMP }}/fosseis/$ULTIMO" >> relatorio_${{ env.TIMESTAMP }}.md
              echo '```' >> relatorio_${{ env.TIMESTAMP }}.md
            fi
          fi
        else
          echo "**🦴 Fósseis:** Nenhum (todos vivos?)" >> relatorio_${{ env.TIMESTAMP }}.md
        fi
        
        # Estatísticas do mundo
        if [ -d "atena_mundo_${{ env.TIMESTAMP }}/mundo" ]; then
          RECURSOS=$(ls -1 atena_mundo_${{ env.TIMESTAMP }}/mundo/recurso_*.dat 2>/dev/null | wc -l)
          DIRS=$(find atena_mundo_${{ env.TIMESTAMP }}/mundo -maxdepth 1 -type d | wc -l)
          echo "" >> relatorio_${{ env.TIMESTAMP }}.md
          echo "**🌍 Mundo:**" >> relatorio_${{ env.TIMESTAMP }}.md
          echo "   - Recursos restantes: $RECURSOS" >> relatorio_${{ env.TIMESTAMP }}.md
          echo "   - Diretórios de organismos: $((DIRS-1))" >> relatorio_${{ env.TIMESTAMP }}.md
        fi
        
        cat relatorio_${{ env.TIMESTAMP }}.md
    
    - name: 📤 Preservar o mundo (artefatos)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: atena-mundo-${{ env.TIMESTAMP }}
        path: |
          atena_mundo_${{ env.TIMESTAMP }}/
          relatorio_${{ env.TIMESTAMP }}.md
        retention-days: 30  # Guarda por 30 dias
        if-no-files-found: warn
    
    - name: 📤 Preservar os logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: atena-logs-${{ env.TIMESTAMP }}
        path: |
          *.log
          atena_mundo_${{ env.TIMESTAMP }}/logs/
        retention-days: 30
        if-no-files-found: ignore
    
    - name: 🌙 ATENA volta a dormir...
      run: |
        echo ""
        echo "╔════════════════════════════════════════════════════════════════╗"
        echo "║                                                                ║"
        echo "║     🌙 ATENA VOLTOU A DORMIR...                               ║"
        echo "║                                                                ║"
        echo "║     Próximo despertar: em 30 minutos                          ║"
        echo "║                                                                ║"
        echo "╚════════════════════════════════════════════════════════════════╝"
        echo ""
        echo "📊 Resumo da vida:"
        echo "   - Viveu: ${{ github.event.inputs.tempo_execucao || '5' }} minutos"
        echo "   - Fósseis: $(ls -1 atena_mundo_${{ env.TIMESTAMP }}/fosseis/ 2>/dev/null | wc -l)"
        echo "   - Mundo salvo em: atena-mundo-${{ env.TIMESTAMP }}"
        echo ""
        echo "⏰ Próximo despertar: $(date -d '+30 minutes' '+%H:%M:%S')"
