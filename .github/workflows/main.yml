name: ATENA Ω - Ciclo de Vida

on:
  schedule:
    - cron: '0,30 * * * *'
  workflow_dispatch:

jobs:
  evolve:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - name: Clonar repositório
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Verificar arquivos
      run: |
        echo "📁 Conteúdo do repositório:"
        ls -la
        
        echo -e "\n📝 Arquivos Python encontrados:"
        find . -name "*.py" -type f || echo "Nenhum arquivo .py encontrado"
    
    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install aiohttp redis tenacity numpy scikit-learn psutil black
    
    - name: Criar main.py se não existir
      run: |
        if [ ! -f "main.py" ]; then
          echo "📝 Criando main.py básico..."
          cat > main.py << 'EOF'
import asyncio
import logging
from datetime import datetime

logging.basicConfig(level=logging.INFO)
logger = logging.getLogger(__name__)

async def main():
    print("🚀 ATENA Ω iniciada")
    logger.info(f"Executando em {datetime.now()}")
    await asyncio.sleep(5)
    print("✅ Ciclo concluído")
    
    with open("estado.txt", "w") as f:
        f.write(f"Executado em {datetime.now()}")

if __name__ == "__main__":
    asyncio.run(main())
EOF
          echo "✅ main.py criado"
        fi
    
    - name: Executar ATENA
      run: |
        echo "🚀 Executando ATENA Ω..."
        python main.py
        echo "✅ Execução concluída"
    
    - name: Commit e push
      run: |
        git config --global user.name "ATENA Ω"
        git config --global user.email "atena@evolution.ai"
        
        git add .
        
        if git diff --cached --quiet; then
          echo "📝 Sem mudanças para commit"
        else
          echo "📦 Mudanças detectadas"
          git commit -m "🤖 Evolução automática $(date +'%Y%m%d%H%M%S')"
          git push
        fi
