name: ATENA Ω - Ciclo de Vida Divino

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  executar-atena:
    name: 🧠 Executar ATENA
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4
    
    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: 🔧 Instalar dependências do sistema
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          libsqlite3-dev \
          sqlite3
    
    - name: 📦 Instalar dependências Python (via ATENA)
      run: |
        python -m pip install --upgrade pip
        python main.py --install-only
    
    - name: 🔍 Testar instalação
      run: |
        python main.py --test-mode
    
    - name: 📁 Criar diretórios
      run: |
        mkdir -p data data/backups logs
    
    - name: 🧠 Executar ATENA
      run: |
        echo "🚀 Iniciando ATENA Ω..."
        python main.py --ciclo-automatico
    
    - name: 💾 Backup dos logs
      if: always()
      run: |
        tar -czf "atena-logs-$(date +'%Y%m%d-%H%M%S').tar.gz" \
          data/ logs/ || true
    
    - name: 📤 Upload de artefatos
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: atena-logs
        path: |
          *.tar.gz
          data/backups/
          logs/
        retention-days: 7
        if-no-files-found: ignore
