name: ATENA Ω - Ciclo de Vida

on:
  schedule:
    - cron: '*/5 * * * *'  # A cada 5 minutos
  workflow_dispatch:

jobs:
  evolve:
    runs-on: ubuntu-latest
    
    steps:
    - name: Clonar repositório
      uses: actions/checkout@v3
      
    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Instalar dependências
      run: |
        pip install -r requirements.txt
        
    - name: Executar ATENA
      env:
        GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: python main.py
      
    - name: Commit e push das mudanças
      run: |
        git config --global user.name "ATENA Ω"
        git config --global user.email "atena@evolution.ai"
        git add .
        git diff --quiet && git diff --staged --quiet || git commit -m "🤖 Evolução automática - Ciclo $(date +'%Y%m%d%H%M%S')"
        git push
