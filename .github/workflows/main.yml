name: ATENA Ω - Ciclo de Vida

on:
  schedule:
    - cron: '0,30 * * * *'  # Executa a cada 30 minutos
  workflow_dispatch:  # Permite execução manual

# Permissões necessárias para commit/push
permissions:
  contents: write

jobs:
  evolve:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - name: Clonar repositório
      uses: actions/checkout@v3
      with:
        fetch-depth: 0  # Busca todo o histórico para diff correto
        token: ${{ secrets.GITHUB_TOKEN }}
      
    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'  # Versão mais recente estável
        cache: 'pip'  # Cache das dependências
        
    - name: Cache Redis
      uses: actions/cache@v3
      with:
        path: ~/redis-data
        key: ${{ runner.os }}-redis-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-redis-
          
    - name: Instalar Redis
      run: |
        sudo apt-get update
        sudo apt-get install -y redis-server
        sudo systemctl start redis-server
        redis-cli ping  # Verifica se Redis está rodando
        
    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        # Instala dependências principais
        pip install aiohttp redis tenacity numpy scikit-learn psutil black astor
        # Instala do requirements.txt se existir
        if [ -f requirements.txt ]; then 
          echo "📦 Instalando dependências do requirements.txt"
          pip install -r requirements.txt
        else
          echo "📝 Criando requirements.txt"
          cat > requirements.txt << EOF
aiohttp>=3.9.0
redis>=5.0.0
tenacity>=8.2.0
numpy>=1.24.0
scikit-learn>=1.3.0
psutil>=5.9.0
black>=23.0.0
astor>=0.8.1
EOF
          pip install -r requirements.txt
        fi
        
    - name: Criar arquivo .env
      run: |
        cat > .env << EOF
        REDIS_URL=redis://localhost:6379
        MAX_RETRIES=3
        TIMEOUT=30
        CACHE_TTL=3600
        MAX_CONCURRENT_REQUESTS=5
        EVOLUTION_THRESHOLD=0.7
        MAX_EVOLUTIONS_PER_DAY=3
        SANDBOX_MEMORY_LIMIT=500
        AUTO_COMMIT=true
        EOF
        
    - name: Verificar código existente
      id: check_code
      run: |
        if [ -f main.py ]; then
          echo "📁 main.py encontrado"
          echo "exists=true" >> $GITHUB_OUTPUT
          # Backup do código atual
          cp main.py main.py.backup
        else
          echo "❌ main.py não encontrado!"
          echo "exists=false" >> $GITHUB_OUTPUT
          exit 1
        fi
        
    - name: Executar ATENA
      id: run_atena
      env:
        GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        REDIS_URL: redis://localhost:6379
      # Roda por 5 minutos e depois encerra graciosamente
      run: |
        echo "🚀 Iniciando ATENA Ω em $(date)"
        echo "🔄 Ciclo de 5 minutos..."
        
        # Executa com timeout e captura saída
        timeout --preserve-status 5m python main.py || exit_code=$?
        
        if [ ${exit_code:-0} -eq 124 ]; then
          echo "⏱️  Ciclo finalizado por timeout (5min)"
          echo "status=timeout" >> $GITHUB_OUTPUT
        elif [ ${exit_code:-0} -eq 0 ]; then
          echo "✅ Ciclo completado com sucesso"
          echo "status=success" >> $GITHUB_OUTPUT
        else
          echo "❌ Erro na execução (código: ${exit_code:-0})"
          echo "status=error" >> $GITHUB_OUTPUT
          # Mostra o erro
          tail -n 50 atena.log 2>/dev/null || echo "Sem logs detalhados"
        fi
        
        echo "fim_em=$(date)" >> $GITHUB_OUTPUT
        
    - name: Verificar mudanças no código
      id: check_changes
      run: |
        # Compara com backup
        if [ -f main.py ] && [ -f main.py.backup ]; then
          if ! cmp -s main.py main.py.backup; then
            echo "🔍 Mudanças detectadas no código!"
            echo "changed=true" >> $GITHUB_OUTPUT
            
            # Mostra diff
            echo "📋 Diff das mudanças:"
            git diff --no-index main.py.backup main.py || true
          else
            echo "📝 Nenhuma mudança no código"
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
        else
          echo "⚠️ Arquivos de backup não encontrados"
          echo "changed=false" >> $GITHUB_OUTPUT
        fi
        
    - name: Salvar estado da memória
      run: |
        # Salva arquivos de estado se existirem
        if [ -f memoria_atena.json ]; then
          cp memoria_atena.json memoria_atena_backup.json
          echo "💾 Memória salva"
        fi
        if [ -f historico_evolucoes.json ]; then
          cp historico_evolucoes.json historico_evolucoes_backup.json
          echo "📊 Histórico de evoluções salvo"
        fi
        if [ -f estado_atena.json ]; then
          cp estado_atena.json estado_atena_backup.json
          echo "📈 Estado atual salvo"
        fi
        
    - name: Commit e push das mudanças
      if: always() && steps.check_changes.outputs.changed == 'true'
      run: |
        git config --global user.name "ATENA Ω 🤖"
        git config --global user.email "atena@evolution.ai"
        
        # Verifica se há mudanças
        if git status --porcelain | grep -q .; then
          echo "📦 Preparando commit com mudanças..."
          
          # Adiciona arquivos relevantes
          git add main.py
          git add *.json 2>/dev/null || true
          git add *.log 2>/dev/null || true
          git add requirements.txt 2>/dev/null || true
          git add .env 2>/dev/null || true
          
          # Mostra o que será commitado
          echo "📋 Arquivos modificados:"
          git status --porcelain
          
          # Cria mensagem de commit com estatísticas
          CICLO_ID=$(date +'%Y%m%d%H%M%S')
          EVOLUCOES=$(jq '. | length' historico_evolucoes.json 2>/dev/null || echo "0")
          REGISTROS=$(jq '.total_registros' estado_atena.json 2>/dev/null || echo "0")
          
          git commit -m "🤖 Evolução automática - Ciclo ${CICLO_ID}

          📊 Estatísticas:
          - Total de registros: ${REGISTROS}
          - Total de evoluções: ${EVOLUCOES}
          - Timestamp: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
          
          Esta atualização foi gerada automaticamente pela ATENA Ω
          como parte do seu ciclo contínuo de auto-evolução."
          
          # Push com retry
          echo "🚀 Enviando mudanças para o repositório..."
          for i in {1..3}; do
            if git push; then
              echo "✅ Push bem-sucedido na tentativa $i"
              break
            else
              echo "⚠️ Tentativa $i falhou, aguardando..."
              sleep 5
              git pull --rebase  # Atualiza antes de tentar novamente
            fi
          done
        else
          echo "📝 Nenhuma mudança para commit"
        fi
        
    - name: Commit mínimo (sem mudanças de código)
      if: always() && steps.check_changes.outputs.changed != 'true'
      run: |
        git config --global user.name "ATENA Ω 🤖"
        git config --global user.email "atena@evolution.ai"
        
        # Adiciona apenas arquivos de estado
        git add *.json 2>/dev/null || true
        git add *.log 2>/dev/null || true
        
        if git status --porcelain | grep -q .; then
          echo "📦 Commitando apenas arquivos de estado..."
          CICLO_ID=$(date +'%Y%m%d%H%M%S')
          git commit -m "📊 Atualização de estado - Ciclo ${CICLO_ID}

          Apenas arquivos de estado foram atualizados.
          Nenhuma mudança estrutural no código."
          
          git push
        else
          echo "📝 Nenhuma mudança para commit"
        fi
        
    - name: Upload de logs como artefato
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: atena-logs-${{ github.run_id }}
        path: |
          *.log
          *.json
          !*/**/__pycache__/**
        retention-days: 7
        
    - name: Notificar status
      if: always()
      run: |
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "🤖 RESUMO DO CICLO ATENA Ω"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "📅 Data: $(date)"
        echo "🔄 Ciclo: ${{ github.run_number }}"
        echo "📊 Status: ${{ steps.run_atena.outputs.status || 'desconhecido' }}"
        echo "📝 Mudanças no código: ${{ steps.check_changes.outputs.changed || 'false' }}"
        echo ""
        
        # Mostra estatísticas se disponíveis
        if [ -f estado_atena.json ]; then
          echo "📈 Estatísticas atuais:"
          jq -r 'to_entries | .[] | "   \(.key): \(.value)"' estado_atena.json 2>/dev/null || true
        fi
        
        if [ -f historico_evolucoes.json ]; then
          EVOLUCOES=$(jq '. | length' historico_evolucoes.json 2>/dev/null || echo "0")
          echo "   total_evolucoes: ${EVOLUCOES}"
        fi
        
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        
    - name: Limpeza
      if: always()
      run: |
        # Remove arquivos temporários
        rm -f main.py.backup
        rm -f *.tmp
        echo "🧹 Limpeza concluída"

# Gatilho para workflow de sucesso
workflow_call:
  outputs:
    status:
      description: "Status da execução"
      value: ${{ jobs.evolve.outputs.status }}
