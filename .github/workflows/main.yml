name: ATENA Ω - Ciclo de Vida

on:
  schedule:
    - cron: '*/5 * * * *'  # A cada 5 minutos
  workflow_dispatch:  # Permite execução manual

jobs:
  evolve:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - name: Clonar DNA
      uses: actions/checkout@v3
      
    - name: Preparar Ambiente
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Instalar Dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Executar ATENA
      env:
        GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
      run: |
        # Garante que o diretório data existe
        mkdir -p data
        # Executa o organismo
        python main.py
        
    - name: Persistir Evolução
      run: |
        # Configurar git
        git config --global user.name "ATENA Ω"
        git config --global user.email "atena@evolution.ai"
        
        # Commit das mudanças
        git add data/ estado.json wiki_update.md modules/atena_autogen/ pensamentos/
        git diff --quiet && git diff --staged --quiet || git commit -m "🤖 Evolução autônoma - Ciclo $(date +'%Y%m%d%H%M%S')"
        git push
