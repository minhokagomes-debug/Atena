name: ATENA Ω - Ciclo de Vida Divino

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    # Executa a cada 30 minutos
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      tempo_execucao:
        description: 'Tempo de simulação (minutos)'
        required: true
        default: '5'
        type: choice
        options:
          - '1'
          - '3'
          - '5'
          - '10'
          - '15'
          - '30'
      populacao_inicial:
        description: 'População inicial'
        required: true
        default: '20'
        type: choice
        options:
          - '10'
          - '20'
          - '50'
          - '100'
          - '200'
      modo_simulacao:
        description: 'Modo de simulação'
        required: true
        default: 'civilizacao'
        type: choice
        options:
          - 'genetico'
          - 'neural'
          - 'civilizacao'
          - 'completo'

# Permite execuções simultâneas
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  despertar-atena:
    name: 🏛️ ATENA Civilização (${{ github.event.schedule && 'automático' || 'manual' }})
    runs-on: ubuntu-latest
    timeout-minutes: 60  # Aumentado para simulações longas
    
    strategy:
      matrix:
        instance: [1]
      max-parallel: 1
    
    steps:
    - name: 🌅 ATENA está despertando...
      run: |
        echo "╔════════════════════════════════════════════════════════════════╗"
        echo "║                                                                ║"
        echo "║     🏛️ ATENA CIVILIZAÇÃO ESTÁ DESPERTANDO!                    ║"
        echo "║                                                                ║"
        echo "╚════════════════════════════════════════════════════════════════╝"
        echo ""
        echo "📅 Data: $(date)"
        echo "⏰ Hora: $(date +%H:%M:%S)"
        echo "🔄 Evento: ${{ github.event_name }}"
        echo "🔢 Instância: ${{ matrix.instance }}"
        echo "⏱️  Tempo: ${{ github.event.inputs.tempo_execucao || '5' }} minutos"
        echo "👥 População: ${{ github.event.inputs.populacao_inicial || '20' }}"
        echo "🎮 Modo: ${{ github.event.inputs.modo_simulacao || 'civilizacao' }}"
        echo ""
    
    - name: 📥 Checkout do código
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
    
    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: 📦 Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install numpy==1.24.3
        # astor não é mais necessário (usamos pickle)
    
    - name: 📁 Preparar o mundo
      run: |
        # Criar estrutura de diretórios com timestamp
        TIMESTAMP=$(date +'%Y%m%d_%H%M%S')
        echo "TIMESTAMP=$TIMESTAMP" >> $GITHUB_ENV
        echo "MODO=${{ github.event.inputs.modo_simulacao || 'civilizacao' }}" >> $GITHUB_ENV
        
        # Estrutura completa para civilizações
        mkdir -p atena_mundo_$TIMESTAMP
        mkdir -p atena_mundo_$TIMESTAMP/{mapa,dna,logs,fosseis,geracoes}
        mkdir -p atena_mundo_$TIMESTAMP/{economia,linguagem,cidades,religioes}
        
        echo "🌍 Mundo criado em: atena_mundo_$TIMESTAMP"
        echo ""
        echo "📁 Estrutura do mundo:"
        tree atena_mundo_$TIMESTAMP/ || ls -la atena_mundo_$TIMESTAMP/
        echo ""
        echo "📊 Estatísticas do mundo:"
        echo "   - Mapa: 2000x2000 (4 milhões de células)"
        echo "   - Continentes: 7"
        echo "   - Capacidade: 1000+ organismos"
    
    - name: 🧬 Verificar recursos do sistema
      run: |
        echo "🔍 Verificando recursos disponíveis..."
        echo "   CPUs: $(nproc)"
        echo "   Memória: $(free -h | grep Mem | awk '{print $2}')"
        echo "   Disco: $(df -h . | tail -1 | awk '{print $2}')"
        echo ""
        echo "✅ Sistema pronto para simulação"
    
    - name: 🏛️ ATENA INICIA CIVILIZAÇÃO
      run: |
        echo ""
        echo "╔════════════════════════════════════════════════════════════════╗"
        echo "║                                                                ║"
        echo "║     🏛️ ATENA CIVILIZAÇÃO ESTÁ VIVA!                           ║"
        echo "║                                                                ║"
        echo "║     ✓ Mapas continentais (2000x2000)                          ║"
        echo "║     ✓ Redes neurais recorrentes                               ║"
        echo "║     ✓ Cidades auto-organizadas                                ║"
        echo "║     ✓ Religiões emergentes                                    ║"
        echo "║     ✓ Guerras entre civilizações                              ║"
        echo "║     ✓ Dialetos e línguas                                      ║"
        echo "║     ✓ Economia e comércio                                     ║"
        echo "╚════════════════════════════════════════════════════════════════╝"
        echo ""
        echo "📊 Início da simulação: $(date)"
        echo "⏱️  Duração: ${{ github.event.inputs.tempo_execucao || '5' }} minutos"
        echo "👥 População inicial: ${{ github.event.inputs.populacao_inicial || '20' }}"
        echo "🎮 Modo: ${{ github.event.inputs.modo_simulacao || 'civilizacao' }}"
        echo "📁 Mundo: atena_mundo_${{ env.TIMESTAMP }}"
        echo ""
        
        # Executa com timeout (converte minutos para segundos)
        TIMEOUT_SEC=$(( ${{ github.event.inputs.tempo_execucao || '5' }} * 60 ))
        timeout $TIMEOUT_SEC python main.py \
          --modo ${{ github.event.inputs.modo_simulacao || 'civilizacao' }} \
          --populacao ${{ github.event.inputs.populacao_inicial || '20' }} \
          --mundo ${{ env.TIMESTAMP }} || echo "✅ Simulação concluída!"
        
        echo ""
        echo "📊 Fim da simulação: $(date)"
    
    - name: 📊 Coletar estatísticas da civilização
      if: always()
      run: |
        echo "# 🏛️ Relatório da Civilização ATENA" > relatorio_${{ env.TIMESTAMP }}.md
        echo "" >> relatorio_${{ env.TIMESTAMP }}.md
        echo "**Data:** $(date)" >> relatorio_${{ env.TIMESTAMP }}.md
        echo "**Evento:** ${{ github.event_name }}" >> relatorio_${{ env.TIMESTAMP }}.md
        echo "**Modo:** ${{ github.event.inputs.modo_simulacao || 'civilizacao' }}" >> relatorio_${{ env.TIMESTAMP }}.md
        echo "**População inicial:** ${{ github.event.inputs.populacao_inicial || '20' }}" >> relatorio_${{ env.TIMESTAMP }}.md
        echo "" >> relatorio_${{ env.TIMESTAMP }}.md
        
        # Estatísticas de cidades
        if [ -d "atena_mundo_${{ env.TIMESTAMP }}/cidades" ]; then
          CIDADES=$(ls -1 atena_mundo_${{ env.TIMESTAMP }}/cidades/ 2>/dev/null | wc -l)
          echo "## 🏙️ CIDADES" >> relatorio_${{ env.TIMESTAMP }}.md
          echo "**Total de cidades:** $CIDADES" >> relatorio_${{ env.TIMESTAMP }}.md
          echo "" >> relatorio_${{ env.TIMESTAMP }}.md
          
          if [ $CIDADES -gt 0 ]; then
            echo "### Últimas cidades fundadas:" >> relatorio_${{ env.TIMESTAMP }}.md
            echo '```' >> relatorio_${{ env.TIMESTAMP }}.md
            ls -la atena_mundo_${{ env.TIMESTAMP }}/cidades/ | tail -10 >> relatorio_${{ env.TIMESTAMP }}.md
            echo '```' >> relatorio_${{ env.TIMESTAMP }}.md
          fi
        fi
        
        # Estatísticas de religiões
        if [ -d "atena_mundo_${{ env.TIMESTAMP }}/religioes" ]; then
          RELIGIOES=$(ls -1 atena_mundo_${{ env.TIMESTAMP }}/religioes/ 2>/dev/null | wc -l)
          echo "## ✝️ RELIGIÕES" >> relatorio_${{ env.TIMESTAMP }}.md
          echo "**Total de religiões:** $RELIGIOES" >> relatorio_${{ env.TIMESTAMP }}.md
          echo "" >> relatorio_${{ env.TIMESTAMP }}.md
        fi
        
        # Estatísticas de línguas
        if [ -d "atena_mundo_${{ env.TIMESTAMP }}/linguagem" ]; then
          LINGUAS=$(ls -1 atena_mundo_${{ env.TIMESTAMP }}/linguagem/ 2>/dev/null | wc -l)
          echo "## 🗣️ LÍNGUAS" >> relatorio_${{ env.TIMESTAMP }}.md
          echo "**Total de línguas/dialetos:** $LINGUAS" >> relatorio_${{ env.TIMESTAMP }}.md
          echo "" >> relatorio_${{ env.TIMESTAMP }}.md
        fi
        
        # Estatísticas de fósseis
        if [ -d "atena_mundo_${{ env.TIMESTAMP }}/fosseis" ]; then
          FOSSEIS=$(ls -1 atena_mundo_${{ env.TIMESTAMP }}/fosseis/ 2>/dev/null | wc -l)
          echo "## 🦴 FÓSSEIS" >> relatorio_${{ env.TIMESTAMP }}.md
          echo "**Total de seres extintos:** $FOSSEIS" >> relatorio_${{ env.TIMESTAMP }}.md
          echo "" >> relatorio_${{ env.TIMESTAMP }}.md
        fi
        
        # Estatísticas de guerras (se existir arquivo de log)
        if [ -f "atena_mundo_${{ env.TIMESTAMP }}/logs/guerras.log" ]; then
          GUERRAS=$(wc -l < atena_mundo_${{ env.TIMESTAMP }}/logs/guerras.log)
          echo "## ⚔️ GUERRAS" >> relatorio_${{ env.TIMESTAMP }}.md
          echo "**Total de conflitos:** $GUERRAS" >> relatorio_${{ env.TIMESTAMP }}.md
          echo "" >> relatorio_${{ env.TIMESTAMP }}.md
          
          if [ $GUERRAS -gt 0 ]; then
            echo "### Últimas guerras:" >> relatorio_${{ env.TIMESTAMP }}.md
            echo '```' >> relatorio_${{ env.TIMESTAMP }}.md
            tail -10 atena_mundo_${{ env.TIMESTAMP }}/logs/guerras.log >> relatorio_${{ env.TIMESTAMP }}.md
            echo '```' >> relatorio_${{ env.TIMESTAMP }}.md
          fi
        fi
        
        # Estatísticas do mapa
        if [ -d "atena_mundo_${{ env.TIMESTAMP }}/mapa" ]; then
          MAPA_SIZE=$(du -sh atena_mundo_${{ env.TIMESTAMP }}/mapa/ 2>/dev/null | cut -f1)
          echo "## 🗺️ MAPA" >> relatorio_${{ env.TIMESTAMP }}.md
          echo "**Tamanho do mapa:** $MAPA_SIZE" >> relatorio_${{ env.TIMESTAMP }}.md
          echo "**Dimensões:** 2000x2000 (4M células)" >> relatorio_${{ env.TIMESTAMP }}.md
          echo "" >> relatorio_${{ env.TIMESTAMP }}.md
        fi
        
        # Estatísticas de DNA
        if [ -d "atena_mundo_${{ env.TIMESTAMP }}/dna" ]; then
          DNAS=$(ls -1 atena_mundo_${{ env.TIMESTAMP }}/dna/ 2>/dev/null | wc -l)
          echo "## 🧬 DNA" >> relatorio_${{ env.TIMESTAMP }}.md
          echo "**Sequências genéticas:** $DNAS" >> relatorio_${{ env.TIMESTAMP }}.md
          echo "" >> relatorio_${{ env.TIMESTAMP }}.md
        fi
        
        # Resumo final
        echo "## 📊 RESUMO" >> relatorio_${{ env.TIMESTAMP }}.md
        echo '```' >> relatorio_${{ env.TIMESTAMP }}.md
        echo "Civilizações: $(ls -1 atena_mundo_${{ env.TIMESTAMP }}/cidades/ 2>/dev/null | wc -l)" >> relatorio_${{ env.TIMESTAMP }}.md
        echo "Religiões: $(ls -1 atena_mundo_${{ env.TIMESTAMP }}/religioes/ 2>/dev/null | wc -l)" >> relatorio_${{ env.TIMESTAMP }}.md
        echo "Línguas: $(ls -1 atena_mundo_${{ env.TIMESTAMP }}/linguagem/ 2>/dev/null | wc -l)" >> relatorio_${{ env.TIMESTAMP }}.md
        echo "Guerras: $(cat atena_mundo_${{ env.TIMESTAMP }}/logs/guerras.log 2>/dev/null | wc -l)" >> relatorio_${{ env.TIMESTAMP }}.md
        echo "Seres que existiram: $(( $(ls -1 atena_mundo_${{ env.TIMESTAMP }}/dna/ 2>/dev/null | wc -l) + $(ls -1 atena_mundo_${{ env.TIMESTAMP }}/fosseis/ 2>/dev/null | wc -l) ))" >> relatorio_${{ env.TIMESTAMP }}.md
        echo '```' >> relatorio_${{ env.TIMESTAMP }}.md
        
        cat relatorio_${{ env.TIMESTAMP }}.md
    
    - name: 📤 Preservar o mundo
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: atena-civilizacao-${{ env.TIMESTAMP }}
        path: |
          atena_mundo_${{ env.TIMESTAMP }}/
          relatorio_${{ env.TIMESTAMP }}.md
        retention-days: 90  # Guarda por 90 dias (história completa)
        if-no-files-found: warn
    
    - name: 📤 Preservar logs e DNA
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: atena-logs-dna-${{ env.TIMESTAMP }}
        path: |
          *.log
          atena_mundo_${{ env.TIMESTAMP }}/logs/
          atena_mundo_${{ env.TIMESTAMP }}/dna/
          atena_mundo_${{ env.TIMESTAMP }}/geracoes/
          atena_mundo_${{ env.TIMESTAMP }}/fosseis/
        retention-days: 90
        if-no-files-found: ignore
    
    - name: 📊 Resumo da civilização
      if: always()
      run: |
        echo ""
        echo "╔════════════════════════════════════════════════════════════════╗"
        echo "║                                                                ║"
        echo "║     🏛️ RESUMO DA CIVILIZAÇÃO                                   ║"
        echo "║                                                                ║"
        echo "╚════════════════════════════════════════════════════════════════╝"
        echo ""
        echo "📊 Estatísticas finais:"
        echo ""
        
        CIDADES=$(ls -1 atena_mundo_${{ env.TIMESTAMP }}/cidades/ 2>/dev/null | wc -l)
        RELIGIOES=$(ls -1 atena_mundo_${{ env.TIMESTAMP }}/religioes/ 2>/dev/null | wc -l)
        LINGUAS=$(ls -1 atena_mundo_${{ env.TIMESTAMP }}/linguagem/ 2>/dev/null | wc -l)
        FOSSEIS=$(ls -1 atena_mundo_${{ env.TIMESTAMP }}/fosseis/ 2>/dev/null | wc -l)
        DNAS=$(ls -1 atena_mundo_${{ env.TIMESTAMP }}/dna/ 2>/dev/null | wc -l)
        GUERRAS=$(cat atena_mundo_${{ env.TIMESTAMP }}/logs/guerras.log 2>/dev/null | wc -l)
        
        echo "   🏙️  Cidades fundadas: $CIDADES"
        echo "   ✝️  Religiões: $RELIGIOES"
        echo "   🗣️  Línguas: $LINGUAS"
        echo "   ⚔️  Guerras: $GUERRAS"
        echo "   🧬 Sequências DNA: $DNAS"
        echo "   🦴 Seres extintos: $FOSSEIS"
        echo "   🌍 Total que existiram: $((DNAS + FOSSEIS))"
        
        echo ""
        echo "📁 Artefatos salvos:"
        echo "   - atena-civilizacao-${{ env.TIMESTAMP }}.zip (mundo completo)"
        echo "   - atena-logs-dna-${{ env.TIMESTAMP }}.zip (registros históricos)"
        echo ""
    
    - name: 🏛️ ATENA registra na história
      if: always()
      run: |
        # Criar linha do tempo
        TIMELINE_FILE="atena_mundo_${{ env.TIMESTAMP }}/linha_do_tempo.txt"
        
        echo "══════════════════════════════════════════════════════════════════" > $TIMELINE_FILE
        echo "                 LINHA DO TEMPO DA CIVILIZAÇÃO ATENA" >> $TIMELINE_FILE
        echo "══════════════════════════════════════════════════════════════════" >> $TIMELINE_FILE
        echo "" >> $TIMELINE_FILE
        echo "📅 Data da simulação: $(date)" >> $TIMELINE_FILE
        echo "⏱️  Duração: ${{ github.event.inputs.tempo_execucao || '5' }} minutos" >> $TIMELINE_FILE
        echo "👥 População inicial: ${{ github.event.inputs.populacao_inicial || '20' }}" >> $TIMELINE_FILE
        echo "" >> $TIMELINE_FILE
        
        if [ -f "atena_mundo_${{ env.TIMESTAMP }}/logs/guerras.log" ]; then
          echo "⚔️ GRANDES GUERRAS:" >> $TIMELINE_FILE
          tail -20 atena_mundo_${{ env.TIMESTAMP }}/logs/guerras.log >> $TIMELINE_FILE
          echo "" >> $TIMELINE_FILE
        fi
        
        if [ -d "atena_mundo_${{ env.TIMESTAMP }}/cidades" ] && [ "$(ls -A atena_mundo_${{ env.TIMESTAMP }}/cidades/)" ]; then
          echo "🏙️ CIDADES FUNDADAS:" >> $TIMELINE_FILE
          ls -la atena_mundo_${{ env.TIMESTAMP }}/cidades/ | tail -20 >> $TIMELINE_FILE
          echo "" >> $TIMELINE_FILE
        fi
        
        echo "══════════════════════════════════════════════════════════════════" >> $TIMELINE_FILE
        echo "FIM DA LINHA DO TEMPO" >> $TIMELINE_FILE
        echo "══════════════════════════════════════════════════════════════════" >> $TIMELINE_FILE
        
        cat $TIMELINE_FILE
    
    - name: 🌙 ATENA volta ao sono ancestral...
      run: |
        echo ""
        echo "╔════════════════════════════════════════════════════════════════╗"
        echo "║                                                                ║"
        echo "║     🌙 ATENA CIVILIZAÇÃO VOLTOU AO SONO ANCESTRAL...          ║"
        echo "║                                                                ║"
        echo "║     Próximo despertar: em 30 minutos                          ║"
        echo "║                                                                ║"
        echo "╚════════════════════════════════════════════════════════════════╝"
        echo ""
        echo "📊 Resumo da civilização:"
        echo "   - Viveu: ${{ github.event.inputs.tempo_execucao || '5' }} minutos"
        echo "   - População inicial: ${{ github.event.inputs.populacao_inicial || '20' }}"
        echo "   - Modo: ${{ github.event.inputs.modo_simulacao || 'civilizacao' }}"
        echo "   - Cidades: $(ls -1 atena_mundo_${{ env.TIMESTAMP }}/cidades/ 2>/dev/null | wc -l)"
        echo "   - Religiões: $(ls -1 atena_mundo_${{ env.TIMESTAMP }}/religioes/ 2>/dev/null | wc -l)"
        echo "   - Guerras: $(cat atena_mundo_${{ env.TIMESTAMP }}/logs/guerras.log 2>/dev/null | wc -l)"
        echo "   - Mundo salvo em: atena-civilizacao-${{ env.TIMESTAMP }}"
        echo ""
        echo "📜 A história foi escrita..."
        echo ""
        echo "⏰ Próximo despertar: $(date -d '+30 minutes' '+%H:%M:%S')"
