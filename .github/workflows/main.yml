name: ATENA Ω - Ciclo de Vida

on:
  schedule:
    - cron: '0,30 * * * *'  # Executa a cada 30 minutos
  workflow_dispatch:

jobs:
  evolve:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # Tempo limite total do Job
    
    steps:
    - name: Clonar repositório
      uses: actions/checkout@v3
      
    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        # Instala do arquivo e também as ferramentas de evolução
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install black astor 
        
    - name: Executar ATENA
      env:
        GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Roda por 5 minutos e depois encerra para salvar o progresso
      run: |
        timeout 5m python main.py || echo "Ciclo de 5min finalizado ou interrompido."
      
    - name: Commit e push das mudanças
      if: always() # Importante: executa mesmo se o script der erro ou timeout
      run: |
        git config --global user.name "ATENA Ω"
        git config --global user.email "atena@evolution.ai"
        git add .
        # Verifica se houve mudanças antes de tentar o commit
        if ! git diff --cached --quiet; then
          git commit -m "🤖 Evolução automática - Ciclo $(date +'%Y%m%d%H%M%S')"
          git push
        else
          echo "Nenhuma mudança estrutural detectada neste ciclo."
        fi
        
